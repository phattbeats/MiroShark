name: Sync with upstream MiroShark

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC daily, ~07:00 ET / ~08:00 EDT
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write           # needed to push commits and tags

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/aaronjmars/MiroShark.git
          git fetch upstream main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if upstream is ahead
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Fork is $BEHIND commits behind upstream."

      - name: Merge upstream/main
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/main --no-edit
          git push origin main

      - name: Tag with today's date
        if: steps.check.outputs.behind != '0'
        run: |
          TAG="v$(date +%Y.%m.%d)"
          # If a tag for today already exists (manual run earlier), skip.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Pushed tag $TAG"
          fi