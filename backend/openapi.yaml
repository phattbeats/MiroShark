openapi: 3.1.0
info:
  title: MiroShark HTTP API
  version: "1.0.0"
  summary: Universal Swarm Intelligence Engine — REST surface for simulations, graphs, reports, sharing, and observability.
  description: |
    The MiroShark backend is a Flask service that orchestrates large agent
    populations through Wonderwall, builds bi-temporal knowledge graphs in
    Neo4j, and generates reports, share cards, and embeds for every run.

    This document is the canonical reference for the **HTTP** surface. The
    bundled MCP server (`backend/mcp_server.py`) exposes a parallel set of
    tools over stdio for Claude Desktop, Cursor, Windsurf and Continue —
    see `GET /api/mcp/status` and `docs/MCP.md` for that path.

    All responses are JSON unless explicitly marked otherwise (PNG share
    cards, file downloads, SSE streams). Successful responses follow the
    `{"success": true, "data": ...}` envelope used throughout the codebase;
    errors return `{"success": false, "error": "..."}` with an appropriate
    HTTP status.

    Endpoints are public on a default install — there is no auth layer in
    the bundled distribution. Operators are expected to bind the backend
    to a private interface or front it with a reverse proxy when deploying
    to production.

    **Mutation endpoints** that write to a simulation's on-disk state
    (`POST /publish`, `POST /resolve`, `POST /outcome`) are gated on a
    shared operator secret supplied via `Authorization: Bearer
    $MIROSHARK_ADMIN_TOKEN`. The token is read from the process
    environment at request time. If `MIROSHARK_ADMIN_TOKEN` is unset or
    empty the endpoints **fail closed** with `503 — admin auth not
    configured` rather than silently allowing the mutation. See
    `AdminToken` under `components.securitySchemes`.

    Discovery endpoints with light cost protection (suggest-scenarios,
    trending, ask) enforce sliding-window rate limits on the calling IP.

  contact:
    name: MiroShark on GitHub
    url: https://github.com/aaronjmars/MiroShark
  license:
    name: AGPL-3.0
    url: https://github.com/aaronjmars/MiroShark/blob/main/LICENSE

servers:
  - url: http://localhost:5001
    description: Local dev — `./miroshark` launcher default
  - url: "{scheme}://{host}"
    description: Custom deployment
    variables:
      scheme:
        default: https
        enum: [http, https]
      host:
        default: miroshark.example.com

tags:
  - name: Setup & Discovery
    description: Pre-simulation onboarding — scenario suggestions, trending feeds, "Just Ask" briefings, preset templates.
  - name: Graph Build
    description: Step 1 of a run — ontology extraction and Neo4j graph construction from a seed document.
  - name: Simulation Lifecycle
    description: Create, prepare, start, stop, fork, branch and director-mode injection.
  - name: Live State
    description: Real-time polling endpoints used by the simulation view (rounds, actions, posts, profiles).
  - name: Analytics
    description: Belief drift, counterfactuals, influence, interaction networks, demographics, quality.
  - name: Interaction
    description: One-on-one or batched chat with simulated agents, including full reasoning traces.
  - name: Publish & Embed
    description: Toggle public visibility, embed payload, share card PNG, public landing page, gallery.
  - name: Export
    description: JSON/CSV download of an entire simulation.
  - name: Report Agent
    description: ReACT-style report generation with chat, console log, and PDF download.
  - name: Observability
    description: Event stream, paginated event log, LLM call history, aggregate stats.
  - name: Settings & Push
    description: Runtime LLM/Neo4j configuration plus Web Push subscription.
  - name: Integrations
    description: MCP server status surface for AI IDE clients.
  - name: Documentation
    description: This OpenAPI spec and Swagger UI.

paths:

  # ────────────────────────────────────────────────────────────────────
  # Setup & Discovery
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/suggest-scenarios:
    post:
      tags: [Setup & Discovery]
      summary: Generate Bull/Bear/Neutral scenarios from a document preview.
      description: |
        Takes the first ~2000 chars of a document and returns up to three
        prediction-market-style simulation scenarios so users don't face
        a blank-page setup. Results are SHA-256 keyed and LRU-cached.
        On LLM failure returns `200` with `suggestions: []` and a `reason`
        code so the panel hides silently.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text_preview:
                  type: string
                  description: Document text preview — first ~2000 characters is enough.
                simulation_prompt:
                  type: string
                  description: Optional user-provided framing/prompt — biases the suggestions.
                no_cache:
                  type: boolean
                  default: false
                  description: Bypass the in-memory LRU cache and force a fresh LLM call.
              required: [text_preview]
            example:
              text_preview: "The European Central Bank meets next month to consider a 25bp rate cut..."
              simulation_prompt: "What will happen to EUR/USD?"
      responses:
        "200":
          description: Suggestion list (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          description: Rate limited — try again shortly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsEnvelope"

  /api/simulation/trending:
    get:
      tags: [Setup & Discovery]
      summary: Recent items from configured RSS/Atom feeds.
      description: |
        Stdlib RSS/Atom parser running over up to 12 feeds in parallel.
        Defaults to `Reuters tech / The Verge / Hacker News / CoinDesk`;
        override with the `TRENDING_FEEDS` environment variable or the
        `feeds` query param. Never 5xx's — empty `items` plus a `reason`
        string surfaces failures non-fatally.
      parameters:
        - in: query
          name: feeds
          schema: { type: string }
          description: Comma-separated URL list overriding `TRENDING_FEEDS`.
        - in: query
          name: refresh
          schema: { type: string, enum: ["1", "true", "yes"] }
          description: Bypass the in-memory cache.
      responses:
        "200":
          description: Trending items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingEnvelope"
        "429":
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingEnvelope"

  /api/simulation/ask:
    post:
      tags: [Setup & Discovery]
      summary: Just-Ask — synthesize a seed briefing from a question.
      description: Type a question with no document and the LLM researches/writes the seed briefing for the simulation engine.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
      responses:
        "200":
          description: Briefing payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/graph/fetch-url:
    post:
      tags: [Setup & Discovery]
      summary: Fetch and extract readable text from a URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
      responses:
        "200":
          description: Extracted text.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/templates/list:
    get:
      tags: [Setup & Discovery]
      summary: List preset simulation templates.
      responses:
        "200":
          description: Available templates.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/templates/capabilities:
    get:
      tags: [Setup & Discovery]
      summary: Backend feature flags governing template behaviour.
      description: |
        Lets the frontend gray out toggles like "Live oracle data" or
        "Per-agent MCP tools" when the corresponding server-side env
        flag is off — cleaner than surprising the user with a silent
        no-op on a feature they enabled in the UI.
      responses:
        "200":
          description: Capability flags.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          oracle_seed_enabled: { type: boolean }
                          mcp_agent_tools_enabled: { type: boolean }

  /api/templates/{template_id}:
    get:
      tags: [Setup & Discovery]
      summary: Single template optionally enriched with live FeedOracle context.
      parameters:
        - in: path
          name: template_id
          required: true
          schema: { type: string }
        - in: query
          name: enrich
          schema: { type: boolean }
          description: When true, attach live FeedOracle MCP enrichment.
      responses:
        "200":
          description: Template document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ────────────────────────────────────────────────────────────────────
  # Graph Build
  # ────────────────────────────────────────────────────────────────────

  /api/graph/ontology/generate:
    post:
      tags: [Graph Build]
      summary: NER + ontology extraction from raw text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
                project_id: { type: string }
      responses:
        "200":
          description: Async task accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskEnvelope" }

  /api/graph/build:
    post:
      tags: [Graph Build]
      summary: Build a Neo4j graph from a generated ontology.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ontology, project_id]
              properties:
                ontology: { type: object }
                project_id: { type: string }
      responses:
        "200":
          description: Async task accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskEnvelope" }

  /api/graph/task/{task_id}:
    get:
      tags: [Graph Build]
      summary: Poll an async graph-build task.
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/graph/data/{graph_id}:
    get:
      tags: [Graph Build]
      summary: Paginated graph nodes + edges for visualization.
      parameters:
        - in: path
          name: graph_id
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Page of graph data.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/entities/{graph_id}:
    get:
      tags: [Graph Build]
      summary: Browse entities discovered in a graph.
      parameters:
        - in: path
          name: graph_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Entity list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/entities/{graph_id}/{entity_uuid}:
    get:
      tags: [Graph Build]
      summary: Single entity plus its 1-hop neighborhood.
      parameters:
        - in: path
          name: graph_id
          required: true
          schema: { type: string }
        - in: path
          name: entity_uuid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Entity detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/entities/{graph_id}/by-type/{entity_type}:
    get:
      tags: [Graph Build]
      summary: Filter graph entities by type (Person, Organization, Concept …).
      parameters:
        - in: path
          name: graph_id
          required: true
          schema: { type: string }
        - in: path
          name: entity_type
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Entities of the requested type.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/graph/project/{project_id}:
    get:
      tags: [Graph Build]
      summary: Look up a project by id (graph + simulation linkage).
      parameters:
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project record.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ────────────────────────────────────────────────────────────────────
  # Simulation Lifecycle
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/create:
    post:
      tags: [Simulation Lifecycle]
      summary: Create a simulation from a seed graph + scenario prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, simulation_requirement]
              properties:
                project_id: { type: string }
                simulation_requirement:
                  type: string
                  description: The scenario question — Bull/Bear/Neutral framing recommended.
      responses:
        "200":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationEnvelope" }

  /api/simulation/prepare:
    post:
      tags: [Simulation Lifecycle]
      summary: Kick off profile generation (Step 2).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: Preparation started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/prepare/status:
    post:
      tags: [Simulation Lifecycle]
      summary: Poll the profile-generation step.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: Current preparation status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/start:
    post:
      tags: [Simulation Lifecycle]
      summary: Launch the Wonderwall simulation subprocess (Step 3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/SimulationIdBody"
                - type: object
                  properties:
                    platform:
                      type: string
                      enum: [twitter, reddit, parallel]
                      default: parallel
                    max_rounds:
                      type: integer
                      description: Optional cap to truncate overly long simulations.
                    enable_graph_memory_update:
                      type: boolean
                      default: false
                    force:
                      type: boolean
                      default: false
                      description: Stop a running run and clean logs before relaunching.
                    resume:
                      type: boolean
                      default: false
                      description: Resume from the last completed round if a run_state exists.
      responses:
        "200":
          description: Subprocess started.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          simulation_id: { type: string }
                          runner_status: { type: string, enum: [idle, preparing, running, paused, completed, failed] }
                          process_pid: { type: integer }
                          twitter_running: { type: boolean }
                          reddit_running: { type: boolean }
                          started_at: { type: string, format: date-time }
                          graph_memory_update_enabled: { type: boolean }
                          force_restarted: { type: boolean }

  /api/simulation/stop:
    post:
      tags: [Simulation Lifecycle]
      summary: Terminate a running simulation.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: Stopped (or already idle).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/branch-counterfactual:
    post:
      tags: [Simulation Lifecycle]
      summary: Fork a simulation with a counterfactual director-event injection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [simulation_id, branch_round, event]
              properties:
                simulation_id: { type: string }
                branch_round: { type: integer, minimum: 0 }
                event:
                  type: object
                  description: Director event payload — see /director/inject.
      responses:
        "200":
          description: New branched simulation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationEnvelope" }

  /api/simulation/fork:
    post:
      tags: [Simulation Lifecycle]
      summary: Duplicate an existing simulation's config so a new run can be launched.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: New simulation row.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationEnvelope" }

  /api/simulation/{simulation_id}/director/inject:
    post:
      tags: [Simulation Lifecycle]
      summary: Director Mode — inject a breaking-news event into the live timeline.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DirectorEvent" }
      responses:
        "200":
          description: Event accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/director/events:
    get:
      tags: [Simulation Lifecycle]
      summary: List director events injected into a simulation.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Event list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Live State
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/{simulation_id}:
    get:
      tags: [Live State]
      summary: Static simulation record (config, status, profile count).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Simulation record.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/list:
    get:
      tags: [Live State]
      summary: List every simulation on this instance.
      responses:
        "200":
          description: Simulation list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/history:
    get:
      tags: [Live State]
      summary: Per-simulation history with diff between rounds.
      parameters:
        - in: query
          name: simulation_id
          schema: { type: string }
      responses:
        "200":
          description: History records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/run-status:
    get:
      tags: [Live State]
      summary: Current round, totals, runner status.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Run status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/RunStatus" }

  /api/simulation/{simulation_id}/run-status/detail:
    get:
      tags: [Live State]
      summary: Run status with the full per-platform action log.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: query
          name: platform
          schema: { type: string, enum: [twitter, reddit] }
      responses:
        "200":
          description: Detailed run status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/frame/{round_num}:
    get:
      tags: [Live State]
      summary: Compact per-round snapshot for replay scrubbing.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: path
          name: round_num
          required: true
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Frame.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/timeline:
    get:
      tags: [Live State]
      summary: Round-by-round summary across the whole run.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Timeline.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/actions:
    get:
      tags: [Live State]
      summary: Raw agent action log.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Action records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/posts:
    get:
      tags: [Live State]
      summary: Paginated posts (Twitter + Reddit) generated during the run.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: platform
          schema: { type: string, enum: [twitter, reddit] }
      responses:
        "200":
          description: Posts page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/profiles:
    get:
      tags: [Live State]
      summary: Generated agent personas.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Profiles.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/profiles/realtime:
    get:
      tags: [Live State]
      summary: Live agent belief snapshots, updated each round.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Realtime profiles.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/polymarket/markets:
    get:
      tags: [Live State]
      summary: Polymarket-style markets and current prices for this simulation.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Markets.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/polymarket/market/{market_id}/prices:
    get:
      tags: [Live State]
      summary: Price history for a single market within this simulation.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: path
          name: market_id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Price history.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Analytics
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/{simulation_id}/belief-drift:
    get:
      tags: [Analytics]
      summary: Per-round belief distribution + first consensus round.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Belief drift series.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/BeliefDrift" }

  /api/simulation/{simulation_id}/counterfactual:
    get:
      tags: [Analytics]
      summary: Recompute belief drift with selected agents removed (no re-sim).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: query
          name: exclude_agents
          schema: { type: string }
          description: Comma-separated list of agent IDs to remove.
      responses:
        "200":
          description: Counterfactual drift.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/agent-stats:
    get:
      tags: [Analytics]
      summary: Per-agent engagement and posting counts.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Agent stats.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/influence:
    get:
      tags: [Analytics]
      summary: Top-20 influence leaderboard.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Leaderboard.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/interaction-network:
    get:
      tags: [Analytics]
      summary: Force-directed agent-to-agent interaction graph + echo-chamber metrics.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Network graph.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/demographics:
    get:
      tags: [Analytics]
      summary: Archetype clustering — analyst / influencer / retail / observer …
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Demographics breakdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/quality:
    get:
      tags: [Analytics]
      summary: Run health score — engagement, coherence, diversity, variance.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Quality diagnostics.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/compare:
    get:
      tags: [Analytics]
      summary: Side-by-side belief comparison across simulations.
      parameters:
        - in: query
          name: simulation_ids
          required: true
          schema: { type: string }
          description: Comma-separated simulation IDs.
      responses:
        "200":
          description: Comparison payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Interaction
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/interview:
    post:
      tags: [Interaction]
      summary: Chat with a single agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [simulation_id, agent_name, prompt]
              properties:
                simulation_id: { type: string }
                agent_name: { type: string }
                prompt: { type: string }
      responses:
        "200":
          description: Agent reply.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/interview/batch:
    post:
      tags: [Interaction]
      summary: Ask a group of agents the same question in parallel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [simulation_id, agent_names, prompt]
              properties:
                simulation_id: { type: string }
                agent_names:
                  type: array
                  items: { type: string }
                prompt: { type: string }
      responses:
        "200":
          description: Per-agent replies.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/interview/history:
    post:
      tags: [Interaction]
      summary: Read prior interview transcripts for a simulation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [simulation_id]
              properties:
                simulation_id: { type: string }
                platform: { type: string, enum: [twitter, reddit] }
                agent_id:
                  type: integer
                  description: Restrict to a single agent.
                limit: { type: integer, default: 100 }
      responses:
        "200":
          description: History records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/agents/{agent_name}/trace-interview:
    post:
      tags: [Interaction]
      summary: Chat with full reasoning trace surfaced.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: path
          name: agent_name
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
      responses:
        "200":
          description: Reply + trace.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/interviews/{agent_name}:
    get:
      tags: [Interaction]
      summary: Past interview transcripts with one agent.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: path
          name: agent_name
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Transcripts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Publish & Embed
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/{simulation_id}/publish:
    post:
      tags: [Publish & Embed]
      summary: Toggle a simulation's `is_public` flag.
      description: |
        Mutation endpoint — gated on `Authorization: Bearer
        $MIROSHARK_ADMIN_TOKEN`. See the `AdminToken` security scheme.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                public:
                  type: boolean
                  default: true
      responses:
        "200":
          description: New public state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/embed-summary:
    get:
      tags: [Publish & Embed]
      summary: Compact summary for the embed widget — public sims only.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Summary payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/EmbedSummary" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/share-card.png:
    get:
      tags: [Publish & Embed]
      summary: 1200×630 social share card (Open Graph image).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "PNG image with `Cache-Control: public, max-age=3600`."
          content:
            image/png:
              schema:
                type: string
                format: binary
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/replay.gif:
    get:
      tags: [Publish & Embed]
      summary: Animated belief-replay GIF (one frame per round).
      description: |
        1200×630 animated GIF showing per-round belief drift — bullish
        / neutral / bearish bars sliding to each round's distribution
        with a round counter and progress bar. Same publish gate as the
        share card. Discord and Slack auto-play GIFs from a direct file
        URL, so dropping this link in a channel renders the animation
        inline.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "GIF image with `Cache-Control: public, max-age=3600`."
          content:
            image/gif:
              schema:
                type: string
                format: binary
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/transcript.md:
    get:
      tags: [Publish & Embed]
      summary: Citable Markdown transcript of the simulation.
      description: |
        Per-round agent posts + stance labels + final consensus rendered
        as Markdown with a YAML front-matter block (`sim_id`, `scenario`,
        `agent_count`, `total_rounds`, `consensus_label`, …). Notion,
        Obsidian, Bear, and Substack import the front matter as page
        metadata.

        Pairs with `share-card.png` (preview) and `replay.gif` (motion)
        as the third quote-friendly share format. Same publish gate as
        the share card — requires `is_public=true` on the simulation
        state.

        Trajectories longer than ~80 rounds get the middle rounds
        elided in the rendered Markdown body (the JSON form preserves
        every round) so the document stays readable.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Markdown document with `Cache-Control: public, max-age=60`."
          content:
            text/markdown:
              schema:
                type: string
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/transcript.json:
    get:
      tags: [Publish & Embed]
      summary: Structured JSON transcript of the simulation.
      description: |
        Same payload the Markdown transcript renders from, but as JSON
        so SDK consumers and downstream pipelines (LLM-as-judge evals,
        Python client SDK, …) can consume the per-round agent posts +
        stance labels without parsing Markdown.

        Same publish gate as the Markdown transcript. Pretty-printed
        (`indent=2`) so a `curl` to a file is immediately readable.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "JSON transcript with `Cache-Control: public, max-age=60`."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationTranscript" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/trajectory.csv:
    get:
      tags: [Publish & Embed]
      summary: Per-round belief trajectory as RFC 4180 CSV.
      description: |
        One row per recorded round with the bullish / neutral / bearish
        split (using the same ±0.2 stance threshold as the gallery,
        share card, replay GIF, transcript, webhook, and feed surfaces),
        participating agents, post + engagement counts, and the overall
        quality health. Intended for `pandas.read_csv()` / Excel /
        Tableau / R / Observable — the analyst's default toolkit.

        Pairs with `share-card.png` (preview), `replay.gif` (motion),
        and `transcript.{md,json}` (prose) as the **fifth** export
        surface — the previous four cover the qualitative read of a
        simulation; this one covers the quantitative one.

        Same publish gate as the transcript. The CSV header row is
        emitted even when the trajectory is empty so downstream
        consumers don't have to special-case zero-row files.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "CSV with `Content-Type: text/csv; charset=utf-8` + `Cache-Control: public, max-age=60`."
          content:
            text/csv:
              schema:
                type: string
                description: |
                  RFC 4180 CSV. Column order is locked to:
                  `round,round_timestamp,bullish_pct,neutral_pct,bearish_pct,participating_agents,total_posts,total_engagements,quality_health,participation_rate`.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/trajectory.jsonl:
    get:
      tags: [Publish & Embed]
      summary: Per-round belief trajectory as newline-delimited JSON.
      description: |
        Same row shape as `trajectory.csv` but as JSON Lines — one
        object per line. The format `pandas.read_json(lines=True)`,
        DuckDB `read_json_auto`, and most stream-processing pipelines
        consume natively without a separate CSV-to-DataFrame
        conversion.

        Same publish gate as the CSV form. Empty trajectories yield
        zero bytes (no rows, no header — JSONL has no header concept)
        so a curl into a file produces an empty but well-formed JSONL
        document.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "JSONL with `Content-Type: application/jsonl; charset=utf-8` + `Cache-Control: public, max-age=60`."
          content:
            application/jsonl:
              schema:
                type: string
                description: |
                  One `SimulationTrajectoryRow` JSON object per line.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /share/{simulation_id}:
    get:
      tags: [Publish & Embed]
      summary: Public landing page with Open Graph + Twitter card meta tags.
      description: |
        Mounted at the **root** (no `/api` prefix) so the URL stays clean.
        Returns a tiny HTML page that bots scrape for OG tags and that
        browsers immediately bounce off via `<meta refresh>` + JS to the
        SPA. Honors `X-Forwarded-Proto` / `X-Forwarded-Host`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }

  /watch/{simulation_id}:
    get:
      tags: [Publish & Embed]
      summary: Live spectator-watch page — minimal full-viewport broadcast view.
      description: |
        Mounted at the **root** (no `/api` prefix) so the URL stays a
        clean "watch live →" link. The body carries Open Graph +
        Twitter card meta tags so the URL unfurls as a 1200×630 image
        when pasted into Twitter/X, Discord, Slack, LinkedIn, iMessage,
        etc. — same auto-unfurl behaviour as `/share/{simulation_id}`,
        but the surface is purpose-built for *in-progress* simulations
        rather than finished ones.

        The page is fully self-contained server-side HTML — no SPA
        build dependency. A vanilla-JS poller updates the belief bar,
        round counter, and progress bar every 15 s by hitting the
        existing `/api/simulation/{simulation_id}/embed-summary` and
        `/api/simulation/{simulation_id}/run-status` REST endpoints.
        Once the runner reaches a terminal state (`completed` /
        `failed` / `stopped`) polling stops and the "View full
        simulation →" + "Fork this scenario →" CTAs are revealed.

        No auth — but the underlying live endpoints honour
        `is_public`, so a private simulation only renders the bare
        broadcast frame (no scenario, no live numbers). Honors
        `X-Forwarded-Proto` / `X-Forwarded-Host`.

        Seventh thin renderer over the same on-disk `sim_dir/` folder
        alongside the share card (PNG), replay GIF, transcript
        (Markdown + JSON), public-gallery feeds (Atom + RSS), and
        trajectory export (CSV + JSONL).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/simulation/public:
    get:
      tags: [Publish & Embed]
      summary: Filterable, paginated gallery feed of public simulations.
      description: |
        Discovery layer for the `/explore` and `/verified` views. Returns
        the same gallery card payload that the share card, replay GIF,
        transcript, RSS feed, and trajectory exports all share — same
        ±0.2 stance threshold, same on-disk `sim_dir/` substrate.

        Optional filters compose with logical AND:

        * `q` — case-insensitive substring match against the scenario.
        * `consensus` — `bullish` / `neutral` / `bearish`. Filters by the
          dominant final-round stance using the same ±0.2 threshold the
          share card / replay GIF / transcript / webhook / feed all use.
        * `quality` — `excellent` / `good` / `fair` / `poor`. Compared
          against the first word of the simulation's `quality_health`.
        * `outcome` — `correct` / `incorrect` / `partial`. Implies
          `verified=1`.

        `total` reflects the filtered count (not the full corpus), so the
        client can render an accurate "X remaining" hint and `has_more`
        flag for the active filter set.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: page
          description: |
            1-based page number — alternative to `offset`. Wins over
            `offset` when both are supplied. `page=1` is offset 0.
          schema: { type: integer, minimum: 1 }
        - in: query
          name: verified
          description: |
            Truthy values (`1`, `true`, `yes`, `on`) restrict the listing to
            simulations with a recorded outcome annotation — i.e. the
            "Verified Prediction" hall.
          schema: { type: string }
        - in: query
          name: q
          description: |
            Case-insensitive substring match against the scenario text.
            Trimmed and capped at 200 characters.
          schema: { type: string, maxLength: 200 }
        - in: query
          name: consensus
          description: |
            Filter to cards whose dominant final consensus matches the
            chosen stance (using the same ±0.2 threshold as every other
            surface).
          schema:
            type: string
            enum: [bullish, neutral, bearish]
        - in: query
          name: quality
          description: |
            Filter to cards whose `quality_health` first word matches the
            requested tier (case-insensitive).
          schema:
            type: string
            enum: [excellent, good, fair, poor]
        - in: query
          name: outcome
          description: |
            Filter to verified simulations whose recorded outcome label
            matches. Implies `verified=1`.
          schema:
            type: string
            enum: [correct, incorrect, partial]
        - in: query
          name: sort
          description: |
            `date` (default — newest first), `rounds` (highest
            `current_round` first), or `agents` (largest population
            first).
          schema:
            type: string
            enum: [date, rounds, agents]
            default: date
      responses:
        "200":
          description: Gallery cards.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/GalleryCard" }
                      count: { type: integer }
                      total: { type: integer }
                      limit: { type: integer }
                      offset: { type: integer }
                      page: { type: integer }
                      has_more: { type: boolean }
                      verified_only: { type: boolean }
                      q: { type: string }
                      consensus:
                        type: string
                        nullable: true
                        enum: [bullish, neutral, bearish, null]
                      quality:
                        type: string
                        nullable: true
                        enum: [excellent, good, fair, poor, null]
                      outcome:
                        type: string
                        nullable: true
                        enum: [correct, incorrect, partial, null]
                      sort:
                        type: string
                        enum: [date, rounds, agents]

  # ────────────────────────────────────────────────────────────────────
  # Export
  # ────────────────────────────────────────────────────────────────────

  /api/feed.atom:
    get:
      tags: [Publish & Embed]
      summary: Atom 1.0 syndication feed of the public simulation gallery.
      description: |
        Public MiroShark simulations rendered as an Atom 1.0 XML feed so
        researchers and tooling operators can subscribe via Feedly,
        Readwise, Inoreader, Obsidian RSS, NetNewsWire — every newly
        published simulation lands in their reader the same way an AI
        newsletter does.

        Mirrors `GET /api/simulation/public` selection (publish-gated,
        sorted by `created_at` desc, capped at 20 entries) so a
        subscription stays in lockstep with what shows up on `/explore`.
        Pure stdlib XML — zero new dependencies.

        Each entry carries: scenario as title, consensus split + quality
        + outcome label as summary, share-card PNG as `<media:thumbnail>`
        + `<media:content>`, replay GIF as `<media:content>` so River-
        view aggregators surface motion previews automatically.

        Browsers auto-discover this feed via the `<link rel="alternate"
        type="application/atom+xml">` tag in `index.html`.
      parameters:
        - in: query
          name: verified
          description: |
            Truthy values (`1`, `true`, `yes`, `on`) restrict the feed to
            simulations with a recorded outcome annotation — the same
            curated set the `/verified` page surfaces.
          schema: { type: string }
      responses:
        "200":
          description: |
            Atom 1.0 XML document with `Cache-Control: public, max-age=300`.
          content:
            application/atom+xml:
              schema: { type: string }

  /api/feed.rss:
    get:
      tags: [Publish & Embed]
      summary: RSS 2.0 syndication feed of the public simulation gallery.
      description: |
        Same content + selection as `/api/feed.atom` rendered as RSS 2.0
        for older readers and self-hosted aggregators that haven't moved
        off the legacy format. Published runs include their share-card
        PNG as an `<enclosure>` so podcast-style readers handle it
        natively.
      parameters:
        - in: query
          name: verified
          description: |
            Truthy values (`1`, `true`, `yes`, `on`) restrict the feed to
            simulations with a recorded outcome annotation.
          schema: { type: string }
      responses:
        "200":
          description: |
            RSS 2.0 XML document with `Cache-Control: public, max-age=300`.
          content:
            application/rss+xml:
              schema: { type: string }

  /api/simulation/{simulation_id}/export:
    get:
      tags: [Export]
      summary: Download a full simulation as JSON or CSV.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: query
          name: format
          schema: { type: string, enum: [json, csv], default: json }
        - in: query
          name: include
          schema: { type: string, default: "actions,posts,timeline,agent_stats,metadata" }
          description: Comma-separated section list.
      responses:
        "200":
          description: File download.
          content:
            application/json:
              schema: { type: object }
            text/csv:
              schema: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/article:
    post:
      tags: [Publish & Embed]
      summary: Generate a Substack-style write-up for a finished run.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Article markdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/resolve:
    post:
      tags: [Publish & Embed]
      summary: Mark a simulation as resolved against an actual outcome.
      description: |
        Mutation endpoint — gated on `Authorization: Bearer
        $MIROSHARK_ADMIN_TOKEN`. See the `AdminToken` security scheme.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actual_outcome]
              properties:
                actual_outcome:
                  type: string
                  enum: [YES, NO, PARTIAL, INDETERMINATE]
      responses:
        "200":
          description: Resolution recorded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/outcome:
    get:
      tags: [Publish & Embed]
      summary: Read the verified-prediction annotation for a simulation.
      description: |
        Returns the saved outcome (or `data: null` when the simulation has
        none). Distinct from `/resolve`, which is binary (YES/NO) and tied
        to Polymarket consensus. This annotation is open-ended, gallery-
        facing, and the source for the `?verified=1` filter on
        `/api/simulation/public`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Outcome (may be null when none has been submitted).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/SimulationOutcome"
                          - type: "null"
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Publish & Embed]
      summary: Record a verified-prediction annotation for a public simulation.
      description: |
        Requires `is_public=true` on the simulation (POST `/publish` to
        enable). Submitting again overwrites the previous annotation —
        operators can correct a wrong call without leaving stale records.

        Mutation endpoint — gated on `Authorization: Bearer
        $MIROSHARK_ADMIN_TOKEN`. See the `AdminToken` security scheme.
        `GET /outcome` (above) is **not** gated — the gallery and embed
        widgets read this without a token.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  enum: [correct, incorrect, partial]
                  description: How the agent consensus held up against reality.
                outcome_url:
                  type: string
                  format: uri
                  maxLength: 500
                  description: Optional pointer to the article/tweet/dashboard that confirmed the outcome.
                outcome_summary:
                  type: string
                  maxLength: 280
                  description: Tweet-sized human description of what really happened.
            example:
              label: correct
              outcome_url: https://example.com/aave-incident
              outcome_summary: "Aave's GHO peg broke under the simulated stress scenario on 2026-04-25, matching the agent consensus."
      responses:
        "200":
          description: Outcome saved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/SimulationOutcome" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Simulation is not public.
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  # ────────────────────────────────────────────────────────────────────
  # Report Agent
  # ────────────────────────────────────────────────────────────────────

  /api/report/generate:
    post:
      tags: [Report Agent]
      summary: Launch the ReACT report agent for a simulation.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: Report generation started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/generate/status:
    post:
      tags: [Report Agent]
      summary: Poll a running report-generation job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_id]
              properties:
                report_id: { type: string }
      responses:
        "200":
          description: Status payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}:
    get:
      tags: [Report Agent]
      summary: Full report by id.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/by-simulation/{simulation_id}:
    get:
      tags: [Report Agent]
      summary: Latest report for a given simulation.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/download:
    get:
      tags: [Report Agent]
      summary: Download report as PDF.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF binary.
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /api/report/chat:
    post:
      tags: [Report Agent]
      summary: Chat with the report agent — re-queries the underlying graph.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_id, question]
              properties:
                report_id: { type: string }
                question: { type: string }
      responses:
        "200":
          description: Reply.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/agent-log:
    get:
      tags: [Report Agent]
      summary: Full ReACT agent trace for a report.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trace records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/agent-log/stream:
    get:
      tags: [Report Agent]
      summary: SSE stream of ReACT agent steps as they happen.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema: { type: string }

  /api/report/{report_id}/console-log:
    get:
      tags: [Report Agent]
      summary: Raw LLM call logs for a report.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Console log lines.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/console-log/stream:
    get:
      tags: [Report Agent]
      summary: SSE stream of raw LLM console-log lines.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema: { type: string }

  # ────────────────────────────────────────────────────────────────────
  # Observability
  # ────────────────────────────────────────────────────────────────────

  /api/observability/events/stream:
    get:
      tags: [Observability]
      summary: Live SSE feed of system events.
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema: { type: string }

  /api/observability/events:
